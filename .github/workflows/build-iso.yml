name: Build ISO

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # update-flake-lock job only

jobs:
  build-iso:
    name: Build ISO (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [amd, nvidia, intel]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: anka-os
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check flake (no build)
        run: nix flake check --no-build

      - name: Build ISO (${{ matrix.variant }})
        run: nix build .#packages.x86_64-linux.iso-${{ matrix.variant }} --out-link result-${{ matrix.variant }}

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: anka-os-${{ matrix.variant }}-${{ github.sha }}
          path: result-${{ matrix.variant }}/iso/*.iso
          retention-days: 14
          if-no-files-found: error

      - name: Release ISO
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: result-${{ matrix.variant }}/iso/*.iso
          generate_release_notes: true

  update-flake-lock:
    name: Update flake.lock
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "chore: update flake.lock"
          pr-labels: |
            dependencies
            automated
          pr-body: |
            Automated weekly flake.lock update.

            This PR was created by the `update-flake-lock` GitHub Actions workflow.
          token: "${{ secrets.GITHUB_TOKEN }}"