# Calamares users module configuration for Kiwimi OS
# Module: users

---
# ── Default shell ──────────────────────────────────────────────────────────────
defaultShell: /run/current-system/sw/bin/bash

# ── Groups ────────────────────────────────────────────────────────────────────
# Groups that the new user will be added to.
defaultGroups:
  - wheel
  - networkmanager
  - audio
  - video
  - input
  - docker
  - gamemode
  - render
  - dialout
  - plugdev
  - scanner

# Group for autologin configuration in display managers (SDDM etc.)
autologinGroup: autologin

# Whether to enable autologin for the newly created user.
# Users who want autologin must opt in explicitly via the checkbox.
doAutologin: false

# ── Password policy ────────────────────────────────────────────────────────────
# Disallow common/weak passwords
permitWeakPasswords: false

# Minimum password length (Calamares internal check)
minPasswordLength: 8

# Show a password strength indicator
showPasswordStrengthBar: true

# ── Sudo configuration ─────────────────────────────────────────────────────────
# Members of this group get sudo access (via /etc/sudoers.d/calamares-users)
sudoersGroup: wheel

# Write the sudoers file so wheel members can run sudo without a password during
# initial setup (they can tighten this later via nixos-rebuild).
sudoersConfigPerGroup:
  wheel: "ALL=(ALL:ALL) ALL"

# ── Root account ───────────────────────────────────────────────────────────────
# Disable root login (NixOS default; use sudo instead)
setRootPassword: false

# ── Host name ─────────────────────────────────────────────────────────────────
# Hostname validation regex — allow alphanumeric and hyphens
hostnameRegex: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"

# Suggest a hostname based on the product name
presetHostname: kiwimi

# ── Avatar ────────────────────────────────────────────────────────────────────
# Allow the user to pick an avatar on the users page
avatarFilePath: ""