# Calamares partition module configuration for ANKA OS
# Module: partition (calamares-nixos-extensions)

---
# ── Filesystem defaults ────────────────────────────────────────────────────────
defaultFileSystemType: "btrfs"

availableFileSystemTypes:
  - "btrfs"
  - "ext4"

# ── EFI system partition ───────────────────────────────────────────────────────
efiSystemPartition:    "/boot"
efiSystemPartitionSize: "512M"
efiSystemPartitionName: "ESP"

# ── Btrfs subvolume layout ─────────────────────────────────────────────────────
# These subvolumes are created when the user picks btrfs (the default).
# Kiwimi uses the @ prefix convention for easy snapshotting with Snapper/Timeshift.
btrfsSubvolumes:
  - mountPoint: /
    subvolume:  "@"
    mountOptions:
      - "compress=zstd:3"
      - "noatime"
      - "ssd"
  - mountPoint: /home
    subvolume:  "@home"
    mountOptions:
      - "compress=zstd:3"
      - "noatime"
      - "ssd"
  - mountPoint: /nix
    subvolume:  "@nix"
    mountOptions:
      - "compress=zstd:3"
      - "noatime"
      - "ssd"
  - mountPoint: /.snapshots
    subvolume:  "@snapshots"
    mountOptions:
      - "compress=zstd:3"
      - "noatime"
      - "ssd"

# ── Swap: use zram only, no swap partition ─────────────────────────────────────
# The installer will NOT create a swap partition. Kiwimi uses zram-generator.
userSwapChoices:
  - none

# ── Size recommendations ───────────────────────────────────────────────────────
requiredStorage: 20.0    # GB minimum
recommendedStorage: 40.0 # GB recommended message shown to user

# ── Partitioning presets ───────────────────────────────────────────────────────
# Allow both automatic (erase disk) and manual partitioning
allowManualPartitioning: true
allowReplacePartition:   true
allowBesidePartition:    false   # Dual-boot beside: risky, disabled by default

# ── Partition table ────────────────────────────────────────────────────────────
# GPT is required for UEFI systems
initialPartitionTableType:
  - gpt

# ── Encryption (LUKS2) ─────────────────────────────────────────────────────────
# Offer full-disk encryption when user picks "Erase disk"
luksGeneration: luks2

# Show the encrypt option in the "Erase Disk" flow
alwaysShowPartitionLabels: true