# Calamares welcome module configuration for ANKA OS
# Controls the requirements checker shown on the Welcome page.

---
# ── Requirements checker ───────────────────────────────────────────────────────
# These are checked before the user can proceed with installation.

requirements:
  checker:
    # Minimum free disk space in GiB (0 = disable check)
    # Calamares checks the target disk, not the live ISO squashfs.
    # Set to 0 to disable and let the partition module handle it.
    storage: 0

    # Minimum RAM in GiB
    ram: 1

    # Require power (AC adapter) — disable for desktop/VM installs
    power: false

    # Require internet connection — we do offline install
    internet: false

    # Require display to be large enough
    display: false

  # Text shown when a requirement is not met
  requiredStorage:   10.0
  requiredRam:       1.0

# ── "What's new" section ──────────────────────────────────────────────────────
# Links shown on the welcome page
showSupportUrl:      true
showKnownIssuesUrl:  true
showReleaseNotesUrl: false

# ── Country/locale detection ──────────────────────────────────────────────────
# Try to detect location via GeoIP for locale pre-selection
geoip:
  style:  "json"
  url:    "https://geoip.kde.org/v1/calamares"
  selector: ""