# Calamares installer settings for ANKA OS
# https://github.com/calamares/calamares/blob/calamares/src/calamares/settings.conf

# Paths to search for modules
modules-search:
  - local
  - /run/current-system/sw/lib/calamares/modules
  - /usr/lib/calamares/modules

# Branding component name (must match branding/anka/ directory)
branding: anka

# If this is set to true, the installer will show a "Restart Now" button
# after a successful installation.
prompt-install: false

# Logging verbosity: 0 = quiet, 1 = default, 2 = verbose, 3 = debug
log-level: 1

# Installation sequence — each entry is either a module name or a
# {show: ...} / {exec: ...} block that shows/executes a list of modules.
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - packages
    - luksbootkeyfile
    - plymouthcfg
    - initramfscfg
    - initramfs
    - removeuser
    - umount
  - show:
    - finished

# Global storage keys and defaults
global-storage:
  # Host name default (user can override in users page)
  hostName: anka

# Whether to require the internet connection for installation
# (false because we do offline install from squashfs)
require-internet: false