# git-cliff configuration for ANKA OS changelog
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# ANKA OS Değişiklik Günlüğü\n
Tüm önemli değişiklikler bu belgede belgelenmiştir.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Yayımlanmamış]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} [BREAKING CHANGE]{% endif %} \
([{{ commit.id | truncate(length=7, end="") }}]({{ "https://github.com/anka-os/anka/commit/" ~ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = """
<!-- ANKA OS — https://github.com/anka-os/anka -->
"""
trim = true

[git]
conventional_commits  = true
filter_unconventional = true
split_commits         = false

commit_parsers = [
  # Skip merge commits and chore bumps
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)",    skip = true },
  { message = "^chore",              skip = true },
  { message = "^ci",                 skip = true },
  { message = "^style",              skip = true },

  # Breaking changes first
  { body = ".*BREAKING CHANGE.*",  group = "💥 Kırıcı Değişiklikler" },

  # Functional groups — Turkish labels
  { message = "^feat",             group = "✨ Yeni Özellikler" },
  { message = "^fix",              group = "🐛 Hata Düzeltmeleri" },
  { message = "^security",         group = "🔒 Güvenlik" },
  { message = "^perf",             group = "⚡ Performans" },
  { message = "^refactor",         group = "♻️  Yeniden Yapılandırma" },
  { message = "^docs",             group = "📖 Belgeler" },
  { message = "^test",             group = "🧪 Testler" },
  { message = "^build",            group = "🔧 Derleme" },

  # ANKA-specific scopes
  { message = "^.*\\(hardware\\)", group = "🖥️  Donanım" },
  { message = "^.*\\(kernel\\)",   group = "🖥️  Donanım" },
  { message = "^.*\\(packages\\)", group = "📦 Paketler" },
  { message = "^.*\\(pkgs\\)",     group = "📦 Paketler" },

  # Catch-all for unmatched conventional commits
  { message = ".*",                group = "📝 Diğer" },
]

filter_commits = false
tag_pattern    = "v[0-9].*"
skip_tags      = "v0\\.0\\..*"
ignore_tags    = ""
topo_order     = false
sort_commits   = "newest"